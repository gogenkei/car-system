<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共乘與養車費用管理系統 Premium v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(1.1); }
        }
        .pulse-glow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 font-sans min-h-screen pb-12">

    <header class="bg-stone-900 text-stone-100 shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">🚗 養車共乘系統 Premium v5</h1>
            <div id="cloudStatus" class="flex items-center gap-2 bg-stone-800 px-3 py-1.5 rounded-full border border-stone-700 transition-all">
                <span class="w-2 h-2 rounded-full bg-amber-500 pulse-glow"></span>
                <span class="text-stone-400 font-medium text-[10px]">雲端資料初始化中...</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-200">
                <h2 class="text-xs font-bold uppercase tracking-wider text-stone-400 mb-3">系統數據摘要</h2>
                <div class="space-y-4">
                    <div>
                        <span class="text-xs text-stone-500">初始里程數</span>
                        <p id="dashInitialMileage" class="text-2xl font-semibold text-stone-700">-- km</p>
                    </div>
                    <div>
                        <span class="text-xs text-stone-500">目前最新里程</span>
                        <p id="dashCurrentMileage" class="text-3xl font-bold text-emerald-600">-- km</p>
                    </div>
                    <div class="border-t border-stone-100 pt-3 flex justify-between text-sm">
                        <span class="text-stone-500">本月累計筆數</span>
                        <span id="dashRecordCount" class="font-semibold text-stone-700">0 筆</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-200 space-y-4">
                <h3 class="text-sm font-bold text-stone-700 border-b border-stone-100 pb-2">新增里程 / 費用紀錄</h3>
                
                <div>
                    <label class="block text-xs font-medium text-stone-500 mb-1">紀錄類型</label>
                    <select id="inputDocType" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:outline-none focus:border-stone-400">
                        <option value="mileage">🚗 里程更新</option>
                        <option value="expense">💰 費用支出</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium text-stone-500 mb-1">日期</label>
                    <input type="date" id="inputDate" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:outline-none focus:border-stone-400">
                </div>

                <div>
                    <label class="block text-xs font-medium text-stone-500 mb-1">數值 (里程數 km / 費用金額 $)</label>
                    <input type="number" id="inputValue" placeholder="請輸入數字" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:outline-none focus:border-stone-400">
                </div>

                <div>
                    <label class="block text-xs font-medium text-stone-500 mb-1">備註 / 駕駛員 / 事由</label>
                    <input type="text" id="inputNote" placeholder="例如：張三 (出差) 或 加油維修" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:outline-none focus:border-stone-400">
                </div>

                <button onclick="addNewRecord()" class="w-full bg-stone-900 hover:bg-stone-800 text-white font-medium text-sm py-2.5 rounded-lg transition-colors shadow-sm">
                    確認送出紀錄
                </button>
            </div>

            <div class="bg-stone-50 p-4 rounded-2xl border border-stone-200/60">
                <p class="text-xs text-stone-500 mb-3">當月份帳目與里程確認無誤後，可歸檔至歷史資料庫：</p>
                <button onclick="closeCurrentMonth()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-medium text-sm py-2 rounded-lg transition-colors shadow-sm">
                    📦 進行本月結算歸檔
                </button>
            </div>
        </div>

        <div class="md:col-span-2">
            <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
                <div class="px-5 py-4 border-b border-stone-100 flex justify-between items-center bg-stone-50/50">
                    <h3 class="font-bold text-stone-700 text-sm">本月即時流水帳紀錄</h3>
                    <span class="text-xs text-stone-400">即時雲端同步中</span>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-stone-100/50 text-stone-500 text-xs font-semibold border-b border-stone-200">
                                <th class="p-3">日期</th>
                                <th class="p-3">類型</th>
                                <th class="p-3">數據 / 金額</th>
                                <th class="p-3">摘要說明</th>
                                <th class="p-3 text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="timelineRows" class="text-sm divide-y divide-stone-100">
                            <tr>
                                <td colspan="5" class="p-8 text-center text-stone-400 italic">尚無即時數據，請等待加載或新增資料...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        // 📢 報數標記，確認 GitHub Pages 確實成功抓到最新覆蓋版本
        console.log("📢 報數！這是 2026 全功能終極全覆蓋修正版！");

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. Terence 專屬的 Firebase 金鑰配置
        const firebaseConfig = {
            apiKey: "AIzaSyDCmmNy3jnq1T0nG9BWSd6AIolvNcopFGM",
            authDomain: "track-car-spending.firebaseapp.com",
            projectId: "track-car-spending",
            storageBucket: "track-car-spending.firebasestorage.app",
            messagingSenderId: "706270939073",
            appId: "1:706270939073:web:7df65a4db4f02f6b0f8fa0",
            measurementId: "G-2VZFZ00LJR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "car_sharing_system", "v5_database_premium");

        // 2. 系統狀態核心變數 (完全對接你的資料結構)
        let systemState = { initialMileage: 85820, historyTkm: 0, historyKkm: 0, tyreBaseTkm: 0, tyreBaseKkm: 0 };
        let mileageList = []; 
        let expenseList = []; 
        let historyMonths = [];

        // 初始化日期欄位為今天
        document.getElementById('inputDate').value = new Date().toISOString().slice(0, 10);

        // 3. 雲端資料即時動態監聽
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                // 🟢 雲端有房間，同步更新本地變數
                const cloudData = docSnap.data();
                systemState = cloudData.systemState || { initialMileage: 85820, historyTkm: 0, historyKkm: 0, tyreBaseTkm: 0, tyreBaseKkm: 0 };
                mileageList = cloudData.mileageList || [];
                expenseList = cloudData.expenseList || [];
                historyMonths = cloudData.historyMonths || [];
                
                // 亮起連線成功綠燈
                document.getElementById('cloudStatus').innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-600 pulse-glow"></span><span class="text-stone-200 font-medium text-[10px]">雲端連線正常</span>';
            } else {
                // 🟡 雲端是空的，主動進行初始化建房
                updateCloud();
            }
            // 不論新舊，皆重新渲染畫面
            calculateAndRender();
        }, (error) => {
            console.error("Firebase 監聽失敗:", error);
            document.getElementById('cloudStatus').innerHTML = '<span class="w-2 h-2 rounded-full bg-rose-500"></span><span class="text-rose-400 font-medium text-[10px]">權限鎖死 ERROR</span>';
        });

        // 4. 強大且安全的雲端資料同步函式
        async function updateCloud() {
            try {
                await setDoc(docRef, { systemState, mileageList, expenseList, historyMonths });
            } catch (err) {
                console.error("🚨 Firebase 寫入大失敗，原因：", err);
                alert("❌ 資料同步失敗！\n極可能是您的 Firebase Firestore 安全規則 (Rules) 已過期封鎖。\n請至 Firebase 後台將 Rules 改為 allow read, write: if true;");
            }
        }

        // 5. 畫面渲染與計算法則
        function calculateAndRender() {
            // 更新儀表板靜態文字
            document.getElementById('dashInitialMileage').innerText = `${systemState.initialMileage.toLocaleString()} km`;
            
            // 計算目前最新里程數
            let currentLatestMileage = systemState.initialMileage;
            if (mileageList.length > 0) {
                const maxMileage = Math.max(...mileageList.map(m => Number(m.value)));
                if (maxMileage > currentLatestMileage) currentLatestMileage = maxMileage;
            }
            document.getElementById('dashCurrentMileage').innerText = `${currentLatestMileage.toLocaleString()} km`;
            document.getElementById('dashRecordCount').innerText = `${mileageList.length + expenseList.length} 筆`;

            // 渲染綜合流水帳時間軸 (將里程與費用融合排序展示)
            const timelineRows = document.getElementById('timelineRows');
            timelineRows.innerHTML = '';

            // 合併兩組陣列並標記類型
            const combined = [
                ...mileageList.map((item, idx) => ({ ...item, _type: 'mileage', _originIdx: idx })),
                ...expenseList.map((item, idx) => ({ ...item, _type: 'expense', _originIdx: idx }))
            ];

            // 依日期由新到舊排序
            combined.sort((a, b) => new Date(b.date) - new Date(a.date));

            if (combined.length === 0) {
                timelineRows.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-stone-400 italic">本月目前尚無任何紀錄</td></tr>`;
                return;
            }

            combined.forEach((item) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-stone-50/60 transition-colors';
                
                const typeTag = item._type === 'mileage' 
                    ? '<span class="px-2 py-0.5 rounded text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-200">🚗 里程</span>'
                    : '<span class="px-2 py-0.5 rounded text-xs font-medium bg-amber-50 text-amber-700 border border-amber-200">💰 費用</span>';

                const valDisplay = item._type === 'mileage' ? `${Number(item.value).toLocaleString()} km` : `$${Number(item.value).toLocaleString()}`;

                tr.innerHTML = `
                    <td class="p-3 text-stone-600 font-mono">${item.date}</td>
                    <td class="p-3">${typeTag}</td>
                    <td class="p-3 font-semibold text-stone-700">${valDisplay}</td>
                    <td class="p-3 text-stone-500">${item.note || '-'}</td>
                    <td class="p-3 text-center">
                        <button onclick="deleteRecord('${item._type}', ${item._originIdx})" class="text-xs text-rose-500 hover:text-rose-700 font-medium hover:underline">刪除</button>
                    </td>
                `;
                timelineRows.appendChild(tr);
            });
        }

        // 6. 新增紀錄控制核心
        function addNewRecord() {
            const type = document.getElementById('inputDocType').value;
            const date = document.getElementById('inputDate').value;
            const value = Number(document.getElementById('inputValue').value);
            const note = document.getElementById('inputNote').value.trim();

            if (!date || !value) {
                alert("請填寫正確的日期與數值！");
                return;
            }

            const newObj = { date, value, note };

            if (type === 'mileage') {
                mileageList.push(newObj);
            } else {
                expenseList.push(newObj);
            }

            // 更新至雲端，畫面會經由監聽自動重畫
            updateCloud();
            
            // 清空輸入框
            document.getElementById('inputValue').value = '';
            document.getElementById('inputNote').value = '';
        }

        // 7. 刪除紀錄控制核心
        function deleteRecord(type, originIndex) {
            if (!confirm("確定要刪除這筆紀錄嗎？")) return;
            
            if (type === 'mileage') {
                mileageList.splice(originIndex, 1);
            } else {
                expenseList.splice(originIndex, 1);
            }
            updateCloud();
        }

        // 8. 本月結算歸檔核心 (補足先前遺失的部分)
        function closeCurrentMonth() {
            if (mileageList.length === 0 && expenseList.length === 0) {
                alert("目前本月名冊空空如也，不需結算歸檔喔！");
                return;
            }

            if (!confirm("確定要執行本月結算嗎？\n結算後，當月的流水帳將全部歸檔至歷史紀錄區，並清空主畫面。")) return;

            const archiveData = {
                archiveId: new Date().toISOString().slice(0, 7), // 產生如 "2026-07"
                mileageSnapshot: [...mileageList],
                expenseSnapshot: [...expenseList],
                savedState: { ...systemState }
            };

            // 1. 推入歸檔歷史
            historyMonths.push(archiveData);

            // 2. 如果結算時有最新里程，將其覆蓋為下個月的初始里程
            if (mileageList.length > 0) {
                const maxMileage = Math.max(...mileageList.map(m => Number(m.value)));
                if (maxMileage > systemState.initialMileage) {
                    systemState.initialMileage = maxMileage;
                }
            }

            // 3. 清空當月即時緩衝列表
            mileageList = [];
            expenseList = [];

            // 4. 同步雲端
            updateCloud();
            alert("🎉 本月帳目已成功打包歸檔！新一輪記帳已自動開啟。");
        }


        // ==========================================
        // 🌟 終極關鍵：將模組內的功能「外包公開」給全域 HTML 按鈕認領
        // ==========================================
        window.addNewRecord = addNewRecord;
        window.deleteRecord = deleteRecord;
        window.closeCurrentMonth = closeCurrentMonth;

    </script>
</body>
</html>
