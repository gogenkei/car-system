<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共乘與養車費用管理系統 Premium v7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .5; transform: scale(1.1); }
        }
        .pulse-glow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 font-sans min-h-screen pb-12">

    <header class="bg-stone-900 text-stone-100 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider">🚗 養車共乘系統 Premium v5</h1>
            <div id="cloudStatus" class="flex items-center gap-2 bg-stone-800 px-3 py-1.5 rounded-full border border-stone-700 transition-all">
                <span class="w-2 h-2 rounded-full bg-amber-500 pulse-glow"></span>
                <span class="text-stone-400 font-medium text-[10px]">雲端資料同步中...</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-6 space-y-6">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200">
                <span class="text-xs font-medium text-stone-400 block mb-1">系統里程狀態</span>
                <div class="space-y-1">
                    <div class="text-xs text-stone-500 flex justify-between">
                        <span>初始:</span> <span id="dashInitialMileage" class="font-mono font-semibold">-- km</span>
                    </div>
                    <div class="text-xs text-stone-500 flex justify-between">
                        <span>最新:</span> <span id="dashCurrentMileage" class="text-emerald-600 font-mono font-bold text-lg">-- km</span>
                    </div>
                </div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200">
                <span class="text-xs font-medium text-stone-400 block mb-1">🧑‍✈️ 駕駛 T 歷史總里程</span>
                <p id="dashTkm" class="text-xl font-bold text-stone-700 font-mono">-- km</p>
                <span class="text-[10px] text-stone-400" id="dashTyreBaseT">輪胎基線: -- km</span>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200">
                <span class="text-xs font-medium text-stone-400 block mb-1">👩‍✈️ 駕駛 K 歷史總里程</span>
                <p id="dashKkm" class="text-xl font-bold text-stone-700 font-mono">-- km</p>
                <span class="text-[10px] text-stone-400" id="dashTyreBaseK">輪胎基線: -- km</span>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-stone-200">
                <span class="text-xs font-medium text-stone-400 block mb-1">💰 本月支出總計</span>
                <p id="dashTotalExpense" class="text-2xl font-bold text-amber-600 font-mono">$0</p>
                <span class="text-[10px] text-stone-400" id="dashExpenseCount">共 0 筆紀錄</span>
            </div>
            <div class="bg-stone-900 text-stone-100 p-4 rounded-xl shadow-sm flex flex-col justify-between">
                <span class="text-xs font-medium text-stone-400 block">帳務週期管理</span>
                <button onclick="closeCurrentMonth()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-medium text-xs py-2 rounded-lg transition-colors shadow-sm mt-2">
                    📦 進行本月結算歸檔
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-200 space-y-3">
                <h3 class="text-sm font-bold text-stone-700 border-b border-stone-100 pb-2 flex items-center gap-2">🚗 新增里程紀錄</h3>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-stone-500 mb-1">日期</label>
                        <input type="date" id="mileageDate" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:outline-none focus:border-stone-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-stone-500 mb-1">當前里程數 (km)</label>
                        <input type="number" id="mileageValue" placeholder="請輸入里程" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:outline-none focus:border-stone-400">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-stone-500 mb-1">備註 / 駕駛員事由</label>
                    <input type="text" id="mileageNote" placeholder="例如：Terence (出差)" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:outline-none focus:border-stone-400">
                </div>
                <button onclick="addNewMileage()" class="w-full bg-stone-900 hover:bg-stone-800 text-white font-medium text-sm py-2 rounded-lg transition-colors">
                    登錄里程紀錄
                </button>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-200 space-y-3">
                <h3 class="text-sm font-bold text-stone-700 border-b border-stone-100 pb-2 flex items-center gap-2">💰 新增費用支出</h3>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-stone-500 mb-1">日期</label>
                        <input type="date" id="expenseDate" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:outline-none focus:border-stone-400">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-stone-500 mb-1">支出金額 ($)</label>
                        <input type="number" id="expenseValue" placeholder="請輸入金額" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:outline-none focus:border-stone-400">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-medium text-stone-500 mb-1">費用項目摘要說明</label>
                    <input type="text" id="expenseNote" placeholder="例如：中油加油、定期保養" class="w-full bg-stone-50 border border-stone-200 rounded-lg p-2 text-sm focus:outline-none focus:border-stone-400">
                </div>
                <button onclick="addNewExpense()" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-medium text-sm py-2 rounded-lg transition-colors">
                    登錄費用支出
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
                <div class="px-4 py-3 border-b border-stone-100 bg-stone-50/50 flex justify-between items-center">
                    <h3 class="font-bold text-stone-700 text-xs tracking-wider uppercase">📋 本月里程更動明細</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-stone-100/50 text-stone-500 text-xs font-semibold border-b border-stone-200">
                                <th class="p-3">日期</th>
                                <th class="p-3">里程數</th>
                                <th class="p-3">摘要備註</th>
                                <th class="p-3 text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="mileageRows" class="text-sm divide-y divide-stone-100">
                            <tr><td colspan="4" class="p-4 text-center text-stone-400 italic">無里程資料</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
                <div class="px-4 py-3 border-b border-stone-100 bg-stone-50/50 flex justify-between items-center">
                    <h3 class="font-bold text-stone-700 text-xs tracking-wider uppercase">📋 本月養車支出明細</h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-stone-100/50 text-stone-500 text-xs font-semibold border-b border-stone-200">
                                <th class="p-3">日期</th>
                                <th class="p-3">金額</th>
                                <th class="p-3">項目說明</th>
                                <th class="p-3 text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="expenseRows" class="text-sm divide-y divide-stone-100">
                            <tr><td colspan="4" class="p-4 text-center text-stone-400 italic">無費用資料</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl border border-stone-200 text-xs text-stone-500 flex flex-wrap gap-4 justify-between items-center">
            <div>
                <span>🔧 系統核心參數微調：</span>
                <label class="ml-2">初始里程: <input type="number" id="cfgInitial" class="w-20 border rounded px-1" onchange="updateSystemConfig()"></label>
                <label class="ml-2">T輪胎基線: <input type="number" id="cfgTyreT" class="w-20 border rounded px-1" onchange="updateSystemConfig()"></label>
                <label class="ml-2">K輪胎基線: <input type="number" id="cfgTyreK" class="w-20 border rounded px-1" onchange="updateSystemConfig()"></label>
            </div>
            <span class="text-[10px] text-stone-400 font-mono">Premium Engine v5.1.0</span>
        </div>
    </main>

    <script type="module">
        console.log("📢 報數！最愛的舊版 Layout 與輸入方式全面復活！");

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. Firebase 連線金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyDCmmNy3jnq1T0nG9BWSd6AIolvNcopFGM",
            authDomain: "track-car-spending.firebaseapp.com",
            projectId: "track-car-spending",
            storageBucket: "track-car-spending.firebasestorage.app",
            messagingSenderId: "706270939073",
            appId: "1:706270939073:web:7df65a4db4f02f6b0f8fa0",
            measurementId: "G-2VZFZ00LJR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "car_sharing_system", "v5_database_premium");

        // 2. 本地核心變數定義
        let systemState = { initialMileage: 85820, historyTkm: 0, historyKkm: 0, tyreBaseTkm: 0, tyreBaseKkm: 0 };
        let mileageList = []; 
        let expenseList = []; 
        let historyMonths = [];

        // 自動將輸入日期預設為今天
        const todayStr = new Date().toISOString().slice(0, 10);
        document.getElementById('mileageDate').value = todayStr;
        document.getElementById('expenseDate').value = todayStr;

        // 3. 監聽雲端資料庫
        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const cloudData = docSnap.data();
                systemState = cloudData.systemState || { initialMileage: 85820, historyTkm: 0, historyKkm: 0, tyreBaseTkm: 0, tyreBaseKkm: 0 };
                mileageList = cloudData.mileageList || [];
                expenseList = cloudData.expenseList || [];
                historyMonths = cloudData.historyMonths || [];
                
                document.getElementById('cloudStatus').innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-600 pulse-glow"></span><span class="text-stone-200 font-medium text-[10px]">雲端連線正常</span>';
            } else {
                updateCloud();
            }
            calculateAndRender();
        }, (error) => {
            console.error("Firebase 連線故障:", error);
            document.getElementById('cloudStatus').innerHTML = '<span class="w-2 h-2 rounded-full bg-rose-500"></span><span class="text-rose-400 font-medium text-[10px]">權限到期鎖死</span>';
        });

        // 4. 同步資料至雲端
        async function updateCloud() {
            try {
                await setDoc(docRef, { systemState, mileageList, expenseList, historyMonths });
            } catch (err) {
                console.error("🚨 雲端寫入失敗:", err);
                alert("❌ 同步失敗！請至 Firebase 查看規則是否過期。");
            }
        }

        // 5. 畫面重新渲染與計算法則 (完美對應舊版雙表架構)
        function calculateAndRender() {
            // 更新參數微調輸入框數值
            document.getElementById('cfgInitial').value = systemState.initialMileage;
            document.getElementById('cfgTyreT').value = systemState.tyreBaseTkm || 0;
            document.getElementById('cfgTyreK').value = systemState.tyreBaseKkm || 0;

            // 數據卡片渲染
            document.getElementById('dashInitialMileage').innerText = `${systemState.initialMileage.toLocaleString()} km`;
            
            let currentLatestMileage = systemState.initialMileage;
            if (mileageList.length > 0) {
                const maxMileage = Math.max(...mileageList.map(m => Number(m.value)));
                if (maxMileage > currentLatestMileage) currentLatestMileage = maxMileage;
            }
            document.getElementById('dashCurrentMileage').innerText = `${currentLatestMileage.toLocaleString()} km`;

            // 統計總費用
            const totalExp = expenseList.reduce((sum, item) => sum + Number(item.value), 0);
            document.getElementById('dashTotalExpense').innerText = `$${totalExp.toLocaleString()}`;
            document.getElementById('dashExpenseCount').innerText = `共 ${expenseList.length} 筆紀錄`;

            // 雙駕駛總里程與輪胎顯示
            document.getElementById('dashTkm').innerText = `${(systemState.historyTkm || 0).toLocaleString()} km`;
            document.getElementById('dashKkm').innerText = `${(systemState.historyKkm || 0).toLocaleString()} km`;
            document.getElementById('dashTyreBaseT').innerText = `輪胎基線: ${(systemState.tyreBaseTkm || 0).toLocaleString()} km`;
            document.getElementById('dashTyreBaseK').innerText = `輪胎基線: ${(systemState.tyreBaseKkm || 0).toLocaleString()} km`;

            // --- 渲染左側：里程明細表格 ---
            const mileageRows = document.getElementById('mileageRows');
            mileageRows.innerHTML = '';
            // 由新到舊排序
            const sortedMileage = [...mileageList].sort((a, b) => new Date(b.date) - new Date(a.date));
            if (sortedMileage.length === 0) {
                mileageRows.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-stone-400 italic">本月尚無里程紀錄</td></tr>`;
            } else {
                sortedMileage.forEach((item) => {
                    // 尋找它在原始陣列中的真實 index 以便刪除
                    const origIdx = mileageList.findIndex(m => m.date === item.date && m.value === item.value && m.note === item.note);
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-stone-50/80 transition-colors';
                    tr.innerHTML = `
                        <td class="p-3 text-stone-600 font-mono">${item.date}</td>
                        <td class="p-3 font-semibold text-stone-700">${Number(item.value).toLocaleString()} km</td>
                        <td class="p-3 text-stone-500">${item.note || '-'}</td>
                        <td class="p-3 text-center">
                            <button onclick="deleteRecord('mileage', ${origIdx})" class="text-xs text-rose-500 hover:text-rose-700 hover:underline">刪除</button>
                        </td>
                    `;
                    mileageRows.appendChild(tr);
                });
            }

            // --- 渲染右側：費用明細表格 ---
            const expenseRows = document.getElementById('expenseRows');
            expenseRows.innerHTML = '';
            const sortedExpense = [...expenseList].sort((a, b) => new Date(b.date) - new Date(a.date));
            if (sortedExpense.length === 0) {
                expenseRows.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-stone-400 italic">本月尚無費用明細</td></tr>`;
            } else {
                sortedExpense.forEach((item) => {
                    const origIdx = expenseList.findIndex(e => e.date === item.date && e.value === item.value && e.note === item.note);
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-stone-50/80 transition-colors';
                    tr.innerHTML = `
                        <td class="p-3 text-stone-600 font-mono">${item.date}</td>
                        <td class="p-3 font-semibold text-amber-700">$ ${Number(item.value).toLocaleString()}</td>
                        <td class="p-3 text-stone-500">${item.note || '-'}</td>
                        <td class="p-3 text-center">
                            <button onclick="deleteRecord('expense', ${origIdx})" class="text-xs text-rose-500 hover:text-rose-700 hover:underline">刪除</button>
                        </td>
                    `;
                    expenseRows.appendChild(tr);
                });
            }
        }

        // 6. 獨立功能控制項
        function addNewMileage() {
            const date = document.getElementById('mileageDate').value;
            const value = Number(document.getElementById('mileageValue').value);
            const note = document.getElementById('mileageNote').value.trim();

            if (!date || !value) { alert("請填寫正確的里程日期與數值！"); return; }
            mileageList.push({ date, value, note });
            updateCloud();
            document.getElementById('mileageValue').value = '';
            document.getElementById('mileageNote').value = '';
        }

        function addNewExpense() {
            const date = document.getElementById('expenseDate').value;
            const value = Number(document.getElementById('expenseValue').value);
            const note = document.getElementById('expenseNote').value.trim();

            if (!date || !value) { alert("請填寫正確的費用日期與金額！"); return; }
            expenseList.push({ date, value, note });
            updateCloud();
            document.getElementById('expenseValue').value = '';
            document.getElementById('expenseNote').value = '';
        }

        function deleteRecord(type, index) {
            if (!confirm("確定要刪除這筆紀錄嗎？")) return;
            if (type === 'mileage') {
                mileageList.splice(index, 1);
            } else {
                expenseList.splice(index, 1);
            }
            updateCloud();
        }

        // 底部的手動參數更新
        function updateSystemConfig() {
            systemState.initialMileage = Number(document.getElementById('cfgInitial').value) || 85820;
            systemState.tyreBaseTkm = Number(document.getElementById('cfgTyreT').value) || 0;
            systemState.tyreBaseKkm = Number(document.getElementById('cfgTyreK').value) || 0;
            updateCloud();
        }

        // 7. 本月結算歸檔核心 (徹底解決 missing 故障)
        function closeCurrentMonth() {
            if (mileageList.length === 0 && expenseList.length === 0) {
                alert("目前本月名冊空空如也，不需結算歸檔喔！");
                return;
            }

            if (!confirm("確定要進行本月結算嗎？\n結算後，當月的流水帳將全部打包存入歷史紀錄，並清空主畫面。")) return;

            const archiveData = {
                archiveId: new Date().toISOString().slice(0, 7), // 產生如 "2026-07"
                mileageSnapshot: [...mileageList],
                expenseSnapshot: [...expenseList],
                savedState: { ...systemState }
            };

            historyMonths.push(archiveData);

            // 如果結算時有最新里程，將其滾動覆蓋為下個月的初始里程
            if (mileageList.length > 0) {
                const maxMileage = Math.max(...mileageList.map(m => Number(m.value)));
                if (maxMileage > systemState.initialMileage) {
                    systemState.initialMileage = maxMileage;
                }
            }

            // 清空緩衝
            mileageList = [];
            expenseList = [];

            updateCloud();
            alert("🎉 本月結算成功！資料已完整歸檔封箱。");
        }

        // ==========================================
        // 🌐 終極救星：將所有 HTML 所需按鈕功能發射到 Window 全域
        // ==========================================
        window.addNewMileage = addNewMileage;
        window.addNewExpense = addNewExpense;
        window.deleteRecord = deleteRecord;
        window.updateSystemConfig = updateSystemConfig;
        window.closeCurrentMonth = closeCurrentMonth;

    </script>
</body>
</html>
